        body {
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            padding: 50px 40px;
            text-align: center;
        }

        h1 {

            font-weight: 700;
            color: #1a2b3c;
            margin-bottom: 10px;
        }

        h1 span {

            margin-bottom: 40px;
            border-bottom: 2px dashed #e0e8f0;
            padding-bottom: 20px;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
        }

        .feature-item {
            background: #f8faff;
            padding: 20px 25px;
            border-radius: 20px;
            width: 200px;
            border: 1px solid #edf2f9;
        }

        .feature-item .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 10px;
        }

        .feature-item h3 {
            font-size: 16px;
            color: #1a2b3c;
        }

        .download-section {
            background: #eef4fa;
            border-radius: 30px;
            padding: 40px 20px;
            margin: 30px 0;
        }

        .download-section h2 {
            font-size: 26px;
            color: #1a2b3c;
            margin-bottom: 25px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            color: white;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .btn-mobile {
            background: #3ddc84;
            color: #1a2b3c;
        }

        .btn-mobile:hover {
            background: #2fc873;
            transform: scale(1.03);
        }

        .btn-desktop {
            background: #1a2b3c;
        }

        .btn-desktop:hover {
            background: #2c4055;
            transform: scale(1.03);
        }

        .btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #8a9baa;
        }

        @media (max-width: 650px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 30px;
            }
            .buttons {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            .feature-item {

                max-width: 250px;

</html>
